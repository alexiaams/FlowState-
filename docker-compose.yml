services:
  telecom-api:
    build: .
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  telecom-mcp:
    build: .
    command: python -m app.mcp_server --transport streamable-http
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8001
      MCP_PATH: /mcp
    ports:
      - "8001:8001"

  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    depends_on:
      - telecom-mcp
    command:
      - --port
      - "8002"
      - --server-type
      - streamable-http
      - --
      - http://telecom-mcp:8001/mcp
    ports:
      - "8002:8002"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config/config.yaml", "--port", "4000"]
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - ./config:/app/config
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    depends_on:
      - litellm
      - mcpo
    ports:
      - "3000:8080"
    environment:
      WEBUI_AUTH: "false"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  open-webui-data:
